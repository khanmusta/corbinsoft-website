  <text x="240" y="23" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#1d9fd5" letter-spacing="1.5">IEC 62304 · FDA · ISO 14971 — LIFECYCLE TRACEABILITY</text>

  <!-- ── ROW 1: User Needs → System Reqs ── -->

  <!-- User Needs box -->
  <rect x="16" y="48" width="136" height="86" rx="9" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="16" y="48" width="136" height="4" rx="4" fill="#1d9fd5"/>
  <!-- icon: person/heart hybrid -->
  <circle cx="36" cy="72" r="8" fill="rgba(29,159,213,0.1)" stroke="#1d9fd5" stroke-width="1.2"/>
  <path d="M32 72 q4-5 8 0" stroke="#1d9fd5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <text x="50" y="69" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">User Needs</text>
  <text x="50" y="81" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">URS / UNS</text>
  <text x="24" y="99" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">18 items defined</text>
  <text x="24" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">↔ Risk linked</text>
  <!-- status badge -->
  <rect x="98" y="116" width="46" height="14" rx="5" fill="rgba(0,196,180,0.12)"/>
  <text x="121" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#00a898">✓ Traced</text>

  <!-- Arrow → -->
  <line x1="154" y1="91" x2="173" y2="91" stroke="#1d9fd5" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- System Requirements box -->
  <rect x="176" y="48" width="136" height="86" rx="9" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="176" y="48" width="136" height="4" rx="4" fill="#1d9fd5"/>
  <!-- icon: list -->
  <rect x="190" y="65" width="12" height="2" rx="1" fill="#1d9fd5"/>
  <rect x="190" y="70" width="9" height="2" rx="1" fill="#1d9fd5"/>
  <rect x="190" y="75" width="11" height="2" rx="1" fill="#1d9fd5"/>
  <text x="208" y="69" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">System Reqs</text>
  <text x="208" y="81" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Risk-linked items</text>
  <text x="184" y="99" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">42 requirements</text>
  <text x="184" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">ISO 14971 FMEA</text>
  <rect x="258" y="116" width="46" height="14" rx="5" fill="rgba(0,196,180,0.12)"/>
  <text x="281" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#00a898">✓ Traced</text>

  <!-- Arrow → -->
  <line x1="314" y1="91" x2="333" y2="91" stroke="#1d9fd5" stroke-width="1.5" marker-end="url(#ab)"/>

