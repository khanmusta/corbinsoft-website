  <rect x="336" y="48" width="128" height="86" rx="9" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="336" y="48" width="128" height="4" rx="4" fill="#1d9fd5"/>
  <text x="352" y="69" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">SW Requirements</text>
  <text x="352" y="81" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Class A · B · C</text>
  <text x="344" y="99" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">127 items · SRS</text>
  <text x="344" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Baseline controlled</text>
  <rect x="418" y="116" width="38" height="14" rx="5" fill="rgba(0,196,180,0.12)"/>
  <text x="437" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#00a898">✓ Live</text>

  <!-- Vertical arrows down (col 1→row2, col2→row2, col3→row2) -->
  <line x1="84" y1="136" x2="84" y2="155" stroke="#1d9fd5" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="244" y1="136" x2="244" y2="155" stroke="#3d5a80" stroke-width="1.5" marker-end="url(#as)"/>
  <line x1="400" y1="136" x2="400" y2="155" stroke="#3d5a80" stroke-width="1.5" marker-end="url(#as)"/>

  <!-- ── ROW 2: Risk Items | Architecture | Test Cases ── -->

  <!-- Risk Items (dashed) -->
  <rect x="16" y="158" width="136" height="74" rx="9" fill="rgba(29,159,213,0.04)" stroke="#1d9fd5" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="84" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">Risk Items</text>
  <text x="84" y="191" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">ISO 14971 FMEA</text>
  <text x="84" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">31 items · linked</text>
  <text x="84" y="219" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">to SW requirements</text>

  <!-- Architecture -->
  <rect x="176" y="158" width="136" height="74" rx="9" fill="white" stroke="#3d5a80" stroke-width="1.5"/>
  <rect x="176" y="158" width="136" height="4" rx="4" fill="#3d5a80"/>
  <text x="244" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#3d5a80">Architecture</text>
  <text x="244" y="191" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">SDD · Module Spec</text>
  <text x="244" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">68 design items</text>
  <text x="244" y="219" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Versioned baseline</text>

  <!-- Test Cases -->
  <rect x="336" y="158" width="128" height="74" rx="9" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="336" y="158" width="128" height="4" rx="4" fill="#00c4b4"/>
  <text x="400" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#00a898">Test Cases</text>
  <text x="400" y="191" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Unit · Integ · System</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">204 cases auto-linked</text>
  <text x="400" y="219" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">FDA Part 11 signed</text>

  <!-- Arrows from row 2 down to DHF -->
  <line x1="84" y1="234" x2="84" y2="256" stroke="#1d9fd5" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="244" y1="234" x2="244" y2="256" stroke="#3d5a80" stroke-width="1.5" marker-end="url(#as)"/>
  <line x1="400" y1="234" x2="400" y2="256" stroke="#00c4b4" stroke-width="1.5" marker-end="url(#at)"/>

  <!-- ── DHF Footer ── -->
  <rect x="16" y="258" width="448" height="46" rx="10" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="16" y="258" width="5" height="46" rx="3" fill="#1d9fd5"/>
  <text x="32" y="279" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1d9fd5">Design History File — Auto-Generated</text>
  <text x="32" y="294" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">All artefacts linked · FDA 510(k) / PMA ready · CE marking evidence complete</text>
  <!-- check circle -->
  <circle cx="447" cy="281" r="13" fill="rgba(0,196,180,0.1)" stroke="#00c4b4" stroke-width="1.5"/>
  <path d="M441 281 l4 4 7-7" stroke="#00c4b4" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
