  <text x="359" y="145" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#3d5a80">SVP</text>
  <text x="359" y="158" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Verification Plan + Cases</text>

