  <line x1="406" y1="120" x2="406" y2="126" stroke="#00c4b4" stroke-width="1" opacity="0.5"/>
  <line x1="284" y1="170" x2="284" y2="176" stroke="#3d5a80" stroke-width="1" opacity="0.5"/>
