  <text x="359" y="208" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Config. Management</text>

  <!-- SAS footer (generated) -->
  <rect x="232" y="228" width="232" height="54" rx="9" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="232" y="228" width="5" height="54" rx="3" fill="#00c4b4"/>
