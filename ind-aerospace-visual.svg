  <line x1="222" y1="161" x2="230" y2="148" stroke="#3d5a80" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="222" y1="239" x2="230" y2="248" stroke="#3d5a80" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

