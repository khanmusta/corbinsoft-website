  <rect x="174" y="264" width="132" height="40" rx="8" fill="rgba(0,196,180,0.07)" stroke="#00c4b4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="240" y="281" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" fill="#00a898">Simulink + AUTOSAR</text>
  <text x="240" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#526a7e">Model elements traced to reqs</text>

  <!-- ── RIGHT COLUMN: Verify ── -->

  <!-- Validation Tests -->
  <rect x="320" y="48" width="144" height="80" rx="9" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="320" y="48" width="144" height="4" rx="4" fill="#00c4b4"/>
  <text x="392" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#00a898">Validation Tests</text>
  <text x="392" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">System + Vehicle level</text>
  <text x="392" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Test cases trace to FSRs</text>
  <text x="392" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Automated evidence export</text>

  <!-- down arrow -->
  <line x1="392" y1="130" x2="392" y2="148" stroke="#00c4b4" stroke-width="1.5" marker-end="url(#at)"/>

