  <rect x="320" y="254" width="144" height="50" rx="9" fill="rgba(0,196,180,0.07)" stroke="#00c4b4" stroke-width="1.5"/>
  <text x="392" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#00a898">Safety Audit Trail</text>
  <text x="392" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">TÜV · IATF · ISO 26262 ready</text>

  <!-- Horizontal connectors between columns -->
  <line x1="162" y1="88" x2="172" y2="88" stroke="#1d9fd5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ab)"/>
  <line x1="162" y1="191" x2="172" y2="191" stroke="#3d5a80" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#as)"/>
  <line x1="162" y1="279" x2="172" y2="279" stroke="#3d5a80" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#as)"/>
  <line x1="308" y1="88" x2="318" y2="88" stroke="#1d9fd5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#at)"/>
  <line x1="308" y1="191" x2="318" y2="191" stroke="#3d5a80" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#at)"/>
  <line x1="308" y1="279" x2="318" y2="279" stroke="#00c4b4" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#at)"/>
</svg>
