  <rect x="174" y="125" width="132" height="54" rx="9" fill="white" stroke="#3d5a80" stroke-width="1.5"/>
  <rect x="174" y="125" width="132" height="4" rx="4" fill="#3d5a80"/>
  <text x="240" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="700" fill="#3d5a80">Tier 1 Supplier</text>
  <text x="240" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">ASPICE Level 2-3</text>
  <text x="240" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#8aaabf">ReqIF back ↕</text>

  <!-- Down arrow -->
  <line x1="240" y1="181" x2="240" y2="199" stroke="#3d5a80" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#as)"/>

  <!-- Tier 2 -->
  <rect x="174" y="202" width="132" height="50" rx="9" fill="white" stroke="#3d5a80" stroke-width="1.2"/>
  <rect x="174" y="202" width="132" height="4" rx="4" fill="#3d5a80" opacity="0.4"/>
