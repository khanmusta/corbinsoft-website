  <text x="240" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Vehicle-level HARA</text>
  <text x="240" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#8aaabf">ReqIF export ↓</text>

