<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#1d9fd5" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#00c4b4" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="as" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#3d5a80" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Card background -->
  <rect width="480" height="320" rx="16" fill="#f4f8fd"/>

  <!-- Top label -->
  <rect width="480" height="38" rx="16" fill="#1d9fd5" opacity="0.08"/>
  <rect y="22" width="480" height="16" fill="#1d9fd5" opacity="0.08"/>
  <text x="240" y="23" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#1d9fd5" letter-spacing="1.5">ISO 26262 · ASPICE — SAFETY TRACEABILITY CHAIN</text>

  <!-- ── LEFT COLUMN: Define (OEM / System level) ── -->

  <!-- HARA / Safety Goals box -->
  <rect x="16" y="48" width="144" height="80" rx="9" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="16" y="48" width="144" height="4" rx="4" fill="#1d9fd5"/>
  <!-- ASIL-D badge -->
  <rect x="122" y="53" width="30" height="14" rx="4" fill="#1d9fd5"/>
  <text x="137" y="63" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="white">ASIL D</text>
  <text x="25" y="73" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">HARA + Safety Goals</text>
  <text x="25" y="86" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Hazard analysis · Risk</text>
  <text x="25" y="100" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Item definition complete</text>
  <text x="25" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">12 safety goals defined</text>

  <!-- Arrow down -->
  <line x1="88" y1="130" x2="88" y2="148" stroke="#1d9fd5" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Functional Safety Reqs -->
  <rect x="16" y="151" width="144" height="80" rx="9" fill="white" stroke="#3d5a80" stroke-width="1.5"/>
  <rect x="16" y="151" width="144" height="4" rx="4" fill="#3d5a80"/>
  <rect x="116" y="156" width="36" height="14" rx="4" fill="#3d5a80" opacity="0.8"/>
  <text x="134" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="white">ASIL C-D</text>
  <text x="25" y="175" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#3d5a80">Functional Safety Reqs</text>
  <text x="25" y="188" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">FSR decomposed · linked</text>
  <text x="25" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">to safety goals above</text>
  <text x="25" y="215" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">48 FSRs · propagated</text>

  <!-- Arrow down -->
  <line x1="88" y1="233" x2="88" y2="251" stroke="#3d5a80" stroke-width="1.5" marker-end="url(#as)"/>

