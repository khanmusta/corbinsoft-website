  <rect x="320" y="151" width="144" height="80" rx="9" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="320" y="151" width="144" height="4" rx="4" fill="#00c4b4"/>
  <text x="392" y="171" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#00a898">ASPICE Evidence</text>
  <text x="392" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Process artefacts live</text>
  <text x="392" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Level 2 → Level 3 ready</text>
  <text x="392" y="212" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Audit trail generated</text>

  <!-- down arrow -->
  <line x1="392" y1="233" x2="392" y2="251" stroke="#00c4b4" stroke-width="1.5" marker-end="url(#at)"/>

