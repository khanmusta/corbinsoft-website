<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#1d9fd5" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#00c4b4" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="as" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.5 L7 4 L1 6.5" stroke="#3d5a80" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Card background -->
  <rect width="480" height="320" rx="16" fill="#f4f8fd"/>

  <!-- Top label -->
  <rect width="480" height="38" rx="16" fill="#1d9fd5" opacity="0.08"/>
  <rect y="22" width="480" height="16" fill="#1d9fd5" opacity="0.08"/>
  <text x="240" y="23" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#1d9fd5" letter-spacing="1.5">IEC 61511 · PSSR / COMAH — BID-TO-HANDOVER LIFECYCLE</text>

  <!-- ── 5-stage horizontal process ── -->

  <!-- Connector line behind all circles -->
  <line x1="44" y1="82" x2="436" y2="82" stroke="url(#connGrad)" stroke-width="2.5" opacity="0.35"/>
  <defs>
    <linearGradient id="connGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d9fd5"/>
      <stop offset="100%" stop-color="#00c4b4"/>
    </linearGradient>
  </defs>

  <!-- Stage 1: ITT Capture -->
  <circle cx="44" cy="82" r="20" fill="#1d9fd5" opacity="0.12" stroke="#1d9fd5" stroke-width="1.5"/>
  <text x="44" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">01</text>

  <!-- Stage 2: Scope Allocation -->
  <circle cx="152" cy="82" r="20" fill="#1d9fd5" opacity="0.12" stroke="#1d9fd5" stroke-width="1.5"/>
  <text x="152" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">02</text>

  <!-- Stage 3: Execution Tracking -->
  <circle cx="260" cy="82" r="22" fill="#1d9fd5" opacity="0.18" stroke="#1d9fd5" stroke-width="2"/>
  <text x="260" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">03</text>

  <!-- Stage 4: Change Control -->
  <circle cx="368" cy="82" r="20" fill="#00c4b4" opacity="0.12" stroke="#00c4b4" stroke-width="1.5"/>
  <text x="368" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#00a898">04</text>

  <!-- Stage 5: PSSR Handover -->
  <circle cx="436" cy="82" r="20" fill="#00c4b4" opacity="0.2" stroke="#00c4b4" stroke-width="2"/>
  <text x="436" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#00a898">05</text>

  <!-- Stage labels below circles -->
  <text x="44" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">ITT Capture</text>
  <text x="152" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">Scope Allocation</text>
  <text x="260" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1d9fd5">Execution Track</text>
  <text x="368" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#00a898">Change Control</text>
  <text x="436" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#00a898">PSSR Handover</text>

  <!-- ── ITT Specification box ── -->
  <rect x="16" y="130" width="136" height="82" rx="9" fill="white" stroke="#1d9fd5" stroke-width="1.5"/>
  <rect x="16" y="130" width="136" height="4" rx="4" fill="#1d9fd5"/>
  <text x="84" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1d9fd5">ITT Specification</text>
  <text x="84" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Structured import</text>
  <text x="84" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">1,200+ requirements</text>
  <text x="84" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Data sheets · P&amp;IDs</text>
  <!-- source badge -->
  <rect x="30" y="200" width="74" height="14" rx="4" fill="rgba(29,159,213,0.1)"/>
  <text x="67" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#1d9fd5">Word → Polarion</text>

  <!-- Arrow right -->
  <line x1="154" y1="171" x2="172" y2="171" stroke="#1d9fd5" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ── Multi-Contractor Scope box ── -->
  <rect x="175" y="130" width="130" height="82" rx="9" fill="white" stroke="#3d5a80" stroke-width="1.5"/>
  <rect x="175" y="130" width="130" height="4" rx="4" fill="#3d5a80"/>
  <text x="240" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#3d5a80">Contractor Packages</text>
  <!-- Three sub-contractor bars -->
  <rect x="183" y="158" width="72" height="14" rx="4" fill="rgba(61,90,128,0.08)" stroke="#3d5a80" stroke-width="1"/>
  <text x="219" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#3d5a80">Contractor A — 340 reqs</text>
  <rect x="183" y="176" width="72" height="14" rx="4" fill="rgba(61,90,128,0.08)" stroke="#3d5a80" stroke-width="1"/>
  <text x="219" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#3d5a80">Contractor B — 280 reqs</text>
  <rect x="183" y="194" width="72" height="14" rx="4" fill="rgba(61,90,128,0.08)" stroke="#3d5a80" stroke-width="1"/>
  <text x="219" y="204" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#3d5a80">Contractor C — 215 reqs</text>

  <!-- Arrow right -->
  <line x1="307" y1="171" x2="325" y2="171" stroke="#3d5a80" stroke-width="1.5" marker-end="url(#as)"/>

  <!-- ── Evidence & Change Control box ── -->
  <rect x="328" y="130" width="136" height="82" rx="9" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="328" y="130" width="136" height="4" rx="4" fill="#00c4b4"/>
  <text x="396" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#00a898">Evidence &amp; Change</text>
  <text x="396" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Deliverables verified</text>
  <text x="396" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Change orders governed</text>
  <text x="396" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#526a7e">Impact assessed · priced</text>
  <rect x="340" y="200" width="88" height="14" rx="4" fill="rgba(0,196,180,0.1)"/>
  <text x="384" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#00a898">IEC 61511 traced</text>

  <!-- ── PSSR / Regulatory Handover banner ── -->
  <rect x="16" y="228" width="448" height="76" rx="10" fill="white" stroke="#00c4b4" stroke-width="1.5"/>
  <rect x="16" y="228" width="5" height="76" rx="3" fill="#00c4b4"/>

  <!-- Left text block -->
  <text x="32" y="250" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#00a898">PSSR Regulatory Package — Auto-Generated</text>
  <text x="32" y="266" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">Complete evidence at mechanical completion · COMAH safety case · IEC 61511</text>
  <text x="32" y="282" font-family="system-ui,sans-serif" font-size="8.5" fill="#526a7e">ISO 9001 non-conformance records · HAZOP close-out traceability</text>
  <text x="32" y="296" font-family="system-ui,sans-serif" font-size="8" fill="#8aaabf">Assembled from live data — not from project folders</text>

  <!-- Check mark -->
  <circle cx="447" cy="256" r="14" fill="rgba(0,196,180,0.1)" stroke="#00c4b4" stroke-width="1.5"/>
  <path d="M441 256 l4 4 7-7" stroke="#00c4b4" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Gap stat box -->
  <rect x="370" y="272" width="88" height="28" rx="6" fill="rgba(29,159,213,0.07)" stroke="#1d9fd5" stroke-width="1"/>
  <text x="414" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" fill="#1d9fd5">Gap Report</text>
  <text x="414" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#526a7e">No surprises at FAT</text>

  <!-- Vertical lines from stage circles to boxes -->
  <line x1="84" y1="104" x2="84" y2="128" stroke="#1d9fd5" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="104" x2="240" y2="128" stroke="#1d9fd5" stroke-width="1" opacity="0.5"/>
  <line x1="396" y1="104" x2="396" y2="128" stroke="#00c4b4" stroke-width="1" opacity="0.5"/>
</svg>
